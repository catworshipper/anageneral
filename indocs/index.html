<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internal Docs — Ana</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root {
      --bg: #faf8f5;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e5e2dc;
      --accent: #3d8b7a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    /* Hide content until auth resolves — prevents flash of internal content */
    body:not(.ready) .wrap { display: none; }
    .loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.95rem;
    }
    body.ready .loading { display: none; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 4rem 2rem; }
    .badge {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent);
      border-radius: 999px; padding: 0.15rem 0.6rem; margin-bottom: 1rem;
    }
    h1 { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2.5rem; }
    h2 { font-size: 1.25rem; font-weight: 600; margin: 2rem 0 0.5rem; }
    p { margin-bottom: 1rem; }
    a { color: var(--accent); }
    .back { display: inline-block; margin-top: 2.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    .back:hover { color: var(--text); }
  </style>
</head>
<body>
  <span data-site-version style="display:none;">v260626.09 12:52p</span>

  <div class="loading">Checking access…</div>

  <div class="wrap">
    <span class="badge">Internal</span>
    <h1>Internal Documentation</h1>
    <p class="subtitle">Staff-only reference. This page is not publicly indexed.</p>

    <h2>Getting Started</h2>
    <p>Internal docs content is coming soon.</p>

    <a href="/" class="back">&larr; Back to home</a>
  </div>

  <script src="/vendor/supabase-js-2.39.3.min.js"></script>
  <script type="module">
    import { initAuth, requireRole } from '/shared/auth.js';

    (async () => {
      await initAuth();
      // Guard: staff role or higher (staff, admin, oracle). Redirects otherwise.
      if (requireRole('staff')) {
        document.body.classList.add('ready');
      }
    })();
  </script>
</body>
</html>
